seed: 7
device: auto

dataset:
  format: lmdb
  # Override with:
  #   python main.py --config configs/oc20/s2ef/gotennet.yaml --mode train --dataset-format lmdb --train-path /abs/path/to/train --val-path /abs/path/to/val --device auto
  # or:
  #   export OC20_TRAIN_LMDB=/abs/path/to/train
  #   export OC20_VAL_LMDB=/abs/path/to/val
  #   export OC20_DEVICE=auto
  # Standard OC20/FairChem S2EF layouts typically point at LMDB files or shard directories.
  train_path: data/oc20/s2ef/train
  val_path: data/oc20/s2ef/val_id
  batch_size: 2

model:
  direct_forces: false
  graph:
    cutoff: 6.0
    max_neighbors: 50
  representation:
    n_atom_basis: 128
    n_interactions: 4
    n_rbf: 32
    radial_basis: expnorm
    activation: swish
    max_z: 100
    num_heads: 8
    attn_dropout: 0.0
    edge_updates: false
    lmax: 2
    aggr: add
    scale_edge: false

optimizer:
  lr: 2.0e-4
  weight_decay: 0.0

loss:
  energy_weight: 0.1
  force_weight: 1.0

metrics:
  - energy_mae
  - force_mae

trainer:
  max_epochs: 300

# OC20 S2EF model settings used by configs/oc20/s2ef/gotennet.yaml
_target_: gotennet.models.oc20_model.OC20GotenNetS2EF
direct_forces: false
graph:
  cutoff: 6.0
  max_neighbors: 50
representation:
  n_atom_basis: 128
  n_interactions: 4
  n_rbf: 32
  radial_basis: expnorm
  activation: swish
  max_z: 100
  num_heads: 8
  attn_dropout: 0.0
  edge_updates: false
  lmax: 2
  aggr: add
  scale_edge: false
